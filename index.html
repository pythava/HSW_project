<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnderGarden | Deep Web Lounge</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />

    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/main-style.css">
    <link rel="stylesheet" href="./css/pam-style.css">
    <link rel="stylesheet" href="./css/gif-additions.css"> 

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="ug-layout">

        <nav class="ug-side-nav">
            <div class="nav-header">
                <a href="./index.html" class="logo">UnderGarden</a>
            </div>

            <ul class="nav-links">
                <li>
                    <a href="./index.html" class="active">
                        <span class="material-symbols-rounded">home</span>홈
                    </a>
                </li>
                <li>
                    <a href="./messages/index.html">
                        <span class="material-symbols-rounded">chat_bubble</span>메시지
                    </a>
                </li>
                <li>
                    <a href="./search.html">
                        <span class="material-symbols-rounded">search</span>검색
                    </a>
                </li>
                <li>
                    <a href="./notifications.html" class="noti-link">
                        <span class="material-symbols-rounded">notifications</span>알림
                        <div id="nav-noti-badge" class="badge" style="display:none">0</div>
                    </a>
                </li>
                <li>
                    <a href="./pam.html">
                        <span class="material-symbols-rounded">groups</span>팸
                    </a>
                </li>
                <li>
                    <a href="./settings/index.html">
                        <span class="material-symbols-rounded">settings</span>설정
                    </a>
                </li>
                <li>
                    <a href="./write/index.html" class="write-link">
                        <span class="material-symbols-rounded">add_circle</span>게시하기
                    </a>
                </li>

            </ul>

            <div class="nav-footer">
                <button id="logout-btn">
                    <span class="material-symbols-rounded">logout</span>로그아웃
                </button>
            </div>
        </nav>

        <main class="ug-main-feed">
            <!-- 팸 스타일 배너 -->
            <div class="pam-banner">
                <div class="pam-banner-content">
                    <div class="pam-banner-left">
                        <span class="pam-banner-icon">✦</span>
                        <span class="pam-banner-label">UNDER GARDEN</span>
                    </div>
                    <p class="pam-banner-desc">Deep Web Lounge · 심연의 가든</p>
                </div>
            </div>

            <div class="pam-controls" style="border-bottom:1px solid var(--border);">
                <div class="pam-tabs">
                    <button class="pam-tab active" data-tab="최신">전체 <span class="tab-spark">✦</span></button>
                    <button class="pam-tab" data-tab="팔로잉">팔로잉 <span class="tab-spark">👥</span></button>
                </div>
            </div>

            <div id="main-feed" class="feed-scroll-area">
                <div class="feed-loader">
                    <span class="material-symbols-rounded animation-spin">sync</span>
                    가든 연결 중입니다...
                </div>
            </div>
        </main>

        <aside class="ug-right-panel">
            <div id="auth-section" class="auth-status-card">
                <div class="loader-small">연결 중...</div>
            </div>
            <div class="right-panel-content">
                <section class="trending-topics">
                    <h2>인기 검색어</h2>
                    <ul id="trending-queries">
                        <div class="skeleton-text">분석 중...</div>
                    </ul>
                </section>
            </div>
        </aside>
    </div>
    <script src="./js/supabase-config.js"></script>
    <script src="./js/common-ui.js"></script>
    <script src="./js/auth-handler.js"></script>
    <script src="./js/main-logic.js"></script>
</body>
</html>
