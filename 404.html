<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | 길을 잃은 씨앗</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,400,0,0" />
    <style>
        :root {
            --bg: #0a0a0c;
            --accent: #00ff88;
            --text: #e0e0e6;
            --text-muted: #88888f;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
        }

        .error-container {
            text-align: center;
            padding: 2rem;
        }

        .icon {
            font-size: 80px;
            color: var(--accent);
            margin-bottom: 1rem;
            animation: float 3s ease-in-out infinite;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            letter-spacing: -1px;
        }

        p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin: 1rem 0 2rem;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--accent);
            color: var(--accent);
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: var(--accent);
            color: #000;
            transform: translateY(-2px);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* 심연 배경 효과 */
        .abyss {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0, 255, 136, 0.05) 0%, transparent 70%);
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="abyss"></div>
    <div class="error-container">
        <span class="material-symbols-rounded icon">eco</span>
        <h1>404</h1>
        <p>심연의 너무 깊은 곳까지 오셨군요.<br>이곳에는 아직 씨앗이 심어지지 않았습니다.</p>
        <a href="/" class="back-btn">
            <span class="material-symbols-rounded">home</span>
            가든으로 돌아가기
        </a>
    </div>
</body>
</html>
