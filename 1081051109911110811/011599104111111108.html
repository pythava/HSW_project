<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnderGarden | Admin</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="admin-style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- 접근 차단 오버레이 -->
    <div id="access-denied" class="access-denied-overlay" style="display:none;">
        <div class="access-denied-box">
            <span style="font-size:3rem;">🚫</span>
            <h2>접근 불가</h2>
            <p>이 페이지는 관리자 전용입니다.</p>
            <a href="../index.html" class="btn-primary">홈으로</a>
        </div>
    </div>

    <div id="admin-app" class="admin-layout" style="display:none;">
        <!-- 사이드바 -->
        <nav class="admin-sidebar">
            <div class="admin-logo">
                <span class="material-symbols-rounded">shield</span>
                Admin
            </div>
            <ul class="admin-nav">
                <li>
                    <button class="admin-nav-btn active" data-section="dashboard">
                        <span class="material-symbols-rounded">dashboard</span>대시보드
                    </button>
                </li>
                <li>
                    <button class="admin-nav-btn" data-section="users">
                        <span class="material-symbols-rounded">group</span>유저 검색
                    </button>
                </li>
                <li>
                    <button class="admin-nav-btn" data-section="posts">
                        <span class="material-symbols-rounded">article</span>게시물 검색
                    </button>
                </li>
                <li>
                    <button class="admin-nav-btn" data-section="banners">
                        <span class="material-symbols-rounded">image</span>배너 관리
                    </button>
                </li>
            </ul>
            <div class="admin-sidebar-footer">
                <a href="../index.html" class="admin-nav-btn">
                    <span class="material-symbols-rounded">arrow_back</span>사이트로
                </a>
            </div>
        </nav>

        <!-- 메인 콘텐츠 -->
        <main class="admin-main">
            <!-- 대시보드 -->
            <section id="section-dashboard" class="admin-section active">
                <div class="section-header">
                    <h1>대시보드</h1>
                    <p class="section-sub">UnderGarden 관리 패널</p>
                </div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <span class="material-symbols-rounded stat-icon">group</span>
                        <div class="stat-info">
                            <span class="stat-label">총 유저</span>
                            <span class="stat-value" id="stat-users">—</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <span class="material-symbols-rounded stat-icon">article</span>
                        <div class="stat-info">
                            <span class="stat-label">총 게시물</span>
                            <span class="stat-value" id="stat-posts">—</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <span class="material-symbols-rounded stat-icon">image</span>
                        <div class="stat-info">
                            <span class="stat-label">활성 배너</span>
                            <span class="stat-value" id="stat-banners">—</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 유저 검색 -->
            <section id="section-users" class="admin-section">
                <div class="section-header">
                    <h1>유저 검색</h1>
                    <p class="section-sub">유저명 또는 이메일로 검색</p>
                </div>
                <div class="search-bar-wrap">
                    <span class="material-symbols-rounded">search</span>
                    <input type="text" id="user-search-input" placeholder="유저명 또는 이메일 입력..." class="admin-search-input">
                    <button id="user-search-btn" class="btn-primary">검색</button>
                </div>
                <div id="user-results" class="results-list"></div>
            </section>

            <!-- 게시물 검색 -->
            <section id="section-posts" class="admin-section">
                <div class="section-header">
                    <h1>게시물 검색</h1>
                    <p class="section-sub">제목 또는 내용으로 검색</p>
                </div>
                <div class="search-bar-wrap">
                    <span class="material-symbols-rounded">search</span>
                    <input type="text" id="post-search-input" placeholder="제목 또는 내용 입력..." class="admin-search-input">
                    <button id="post-search-btn" class="btn-primary">검색</button>
                </div>
                <div id="post-results" class="results-list"></div>
            </section>

            <!-- 배너 관리 -->
            <section id="section-banners" class="admin-section">
                <div class="section-header">
                    <h1>배너 관리</h1>
                    <p class="section-sub">홈 화면 배너를 추가·수정·삭제합니다</p>
                    <button id="banner-add-btn" class="btn-primary" style="margin-top:10px;">
                        <span class="material-symbols-rounded">add</span>배너 추가
                    </button>
                </div>
                <div id="banner-list" class="banner-grid"></div>
            </section>
        </main>
    </div>

    <!-- 배너 모달 -->
    <div id="banner-modal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <div class="modal-header">
                <h2 id="modal-title">배너 추가</h2>
                <button id="modal-close" class="modal-close-btn">
                    <span class="material-symbols-rounded">close</span>
                </button>
            </div>
            <div class="modal-body">
                <label class="form-label">배너 제목
                    <input type="text" id="banner-title-input" class="form-input" placeholder="예) 이벤트 안내">
                </label>
                <label class="form-label">부제목 / 설명
                    <input type="text" id="banner-desc-input" class="form-input" placeholder="예) 지금 바로 참여하세요">
                </label>
                <label class="form-label">링크 URL (선택)
                    <input type="text" id="banner-url-input" class="form-input" placeholder="https://...">
                </label>
                <label class="form-label">배경색 (그라디언트 시작)
                    <div class="color-row">
                        <input type="color" id="banner-color1" class="form-color" value="#9d4edd">
                        <input type="color" id="banner-color2" class="form-color" value="#c77dff">
                    </div>
                </label>
                <label class="form-label">이모지 아이콘
                    <input type="text" id="banner-icon-input" class="form-input" placeholder="예) ✦ 🌿 🔥" maxlength="4">
                </label>
                <label class="form-label" style="flex-direction:row;align-items:center;gap:12px;">
                    <input type="checkbox" id="banner-active" checked style="width:18px;height:18px;accent-color:var(--primary);">
                    활성화
                </label>

                <!-- 미리보기 -->
                <div class="preview-label">미리보기</div>
                <div id="banner-preview" class="banner-preview"></div>
            </div>
            <div class="modal-footer">
                <button id="modal-cancel-btn" class="btn-ghost">취소</button>
                <button id="modal-save-btn" class="btn-primary">저장</button>
            </div>
        </div>
    </div>

    <script src="../js/supabase-config.js"></script>
    <script src="admin-logic.js"></script>
</body>
</html>
