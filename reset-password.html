<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnderGarden | 비밀번호 재설정</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/login-style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .reset-box { max-width: 400px; }
        .reset-desc {
            font-size: 0.88rem;
            color: var(--text-2);
            margin-bottom: 24px;
            line-height: 1.6;
        }
        .match-hint {
            font-size: 0.8rem;
            margin-top: 6px;
            min-height: 18px;
            text-align: left;
            padding-left: 4px;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-3);
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--primary); }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box reset-box">
            <div class="login-header">
                <a href="./index.html" class="logo">UnderGarden</a>
                <p id="page-subtitle">새 비밀번호를 설정해주세요</p>
            </div>

            <!-- 토큰 유효 → 비밀번호 입력 폼 -->
            <div id="form-section">
                <p class="reset-desc">이메일로 받은 링크를 통해 인증됐어요.<br>사용할 새 비밀번호를 입력해주세요.</p>
                <div class="input-group">
                    <span class="material-symbols-rounded">lock</span>
                    <input type="password" id="new-password" placeholder="새 비밀번호 (6자 이상)" maxlength="72">
                </div>
                <div class="input-group">
                    <span class="material-symbols-rounded">lock_reset</span>
                    <input type="password" id="confirm-password" placeholder="비밀번호 확인" maxlength="72">
                </div>
                <p class="match-hint" id="match-hint"></p>
                <button id="submit-btn" class="btn-primary" style="margin-top:14px;">비밀번호 변경</button>
                <div id="result-msg" class="error-msg" style="display:none;"></div>
            </div>

            <!-- 토큰 없음 / 만료 → 안내 -->
            <div id="invalid-section" style="display:none;">
                <p class="reset-desc" style="color:var(--error);">
                    유효하지 않거나 만료된 링크예요.<br>
                    로그인 페이지에서 다시 재설정 링크를 요청해주세요.
                </p>
            </div>

            <a href="./login.html" class="back-link">← 로그인으로 돌아가기</a>
        </div>
    </div>

    <script src="./js/supabase-config.js"></script>
    <script>
    (async () => {
        const hash = new URLSearchParams(window.location.hash.replace('#', '?'));
        const accessToken = hash.get('access_token');
        const type = hash.get('type');

        // 유효한 recovery 토큰인지 확인
        if (!accessToken || type !== 'recovery') {
            document.getElementById('form-section').style.display = 'none';
            document.getElementById('invalid-section').style.display = 'block';
            return;
        }

        // 세션 확립
        await supabase.auth.setSession({
            access_token: accessToken,
            refresh_token: hash.get('refresh_token') || ''
        });

        // URL에서 토큰 제거 (보안)
        history.replaceState(null, '', window.location.pathname);

        // 비밀번호 일치 여부 실시간 표시
        ['new-password', 'confirm-password'].forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                const pw = document.getElementById('new-password').value;
                const cf = document.getElementById('confirm-password').value;
                const hint = document.getElementById('match-hint');
                if (!cf) { hint.textContent = ''; return; }
                if (pw === cf) {
                    hint.textContent = '✓ 비밀번호가 일치해요.';
                    hint.style.color = '#4caf50';
                } else {
                    hint.textContent = '✗ 비밀번호가 일치하지 않아요.';
                    hint.style.color = 'var(--error)';
                }
            });
        });

        // 변경 버튼
        document.getElementById('submit-btn').addEventListener('click', async () => {
            const pw = document.getElementById('new-password').value;
            const cf = document.getElementById('confirm-password').value;
            const resultMsg = document.getElementById('result-msg');
            resultMsg.style.display = 'none';

            if (!pw || pw.length < 6) {
                resultMsg.textContent = '비밀번호는 6자 이상이어야 해요.';
                resultMsg.style.display = 'block';
                return;
            }
            if (pw !== cf) {
                resultMsg.textContent = '비밀번호가 일치하지 않아요.';
                resultMsg.style.display = 'block';
                return;
            }

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = '변경 중...';

            const { error } = await supabase.auth.updateUser({ password: pw });

            if (error) {
                btn.disabled = false;
                btn.textContent = '비밀번호 변경';
                resultMsg.textContent = '변경 실패: ' + error.message;
                resultMsg.style.display = 'block';
                return;
            }

            // 성공 → 로그아웃 후 로그인 페이지로
            await supabase.auth.signOut();
            alert('비밀번호가 변경됐어요! 새 비밀번호로 로그인해주세요.');
            window.location.href = './login.html';
        });
    })();
    </script>
</body>
</html>
