<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Garden - Profile</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <nav class="sidebar">
            <div class="logo">
                <img src="../img_hub/img.png" alt="Logo">
                <h1>Under<br>Garden</h1>
            </div>
            <ul class="menu-list">
                <li><a href="../index.html">홈</a></li>
                <li><a href="../dm/index.html">DM</a></li>
                <li><a href="../fam/index.html">팸</a></li>
                <li><a href="../profile/index.html" class="active">프로필</a></li>
                <li><a href="../alarm/index.html">알림</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="content-header">
                <h2>Edit Profile</h2>
            </header>
            
            <section class="profile-container">
                <div class="profile-image-section">
                    <div class="image-wrapper" id="imageClickArea">
                        <img src="./img_hub/default_profile.png" alt="Profile" id="profileDisplay">
                        <div class="image-hover-overlay">
                            <span>사진 변경</span>
                        </div>
                    </div>
                    <input type="file" id="fileInput" accept="image/*" style="display: none;">
                    <p class="image-tip">이미지를 클릭하여 변경하세요.</p>
                </div>

                <form class="profile-form">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="userName">이름</label>
                            <input type="text" id="userName" placeholder="이름을 입력하세요">
                        </div>
                        <div class="form-group">
                            <label for="userAge">나이</label>
                            <input type="number" id="userAge" placeholder="나이">
                        </div>
                        <div class="form-group">
                            <label for="userLocation">지역</label>
                            <input type="text" id="userLocation" placeholder="예: 서울, 부산">
                        </div>
                        <div class="form-group">
                            <label for="userEmail">이메일</label>
                            <input type="email" id="userEmail" placeholder="example@email.com">
                        </div>
                        <div class="form-group full-width">
                            <label for="userFam">소속 팸</label>
                            <input type="text" id="userFam" placeholder="소속된 팸 이름을 입력하세요">
                        </div>
                        <div class="form-group full-width">
                            <label for="userDesc">Description (자기소개)</label>
                            <textarea id="userDesc" rows="5" placeholder="자신을 소개하는 글을 적어주세요."></textarea>
                        </div>
                    </div>
                    
                    <div class="form-footer">
                        <button type="submit" class="save-btn">프로필 저장</button>
                    </div>
                </form>
            </section>
        </main>
    </div>

    <script src="./profile.js"></script>
</body>
</html>
