<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnderGarden | Profile</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/main-style.css">
    <link rel="stylesheet" href="./profile-style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="ug-layout">

        <nav class="ug-side-nav">
            <div class="nav-header">
                <a href="../index.html" class="logo">UnderGarden</a>
            </div>
            <ul class="nav-links">
                <li><a href="../index.html"><span class="material-symbols-rounded">home</span>홈</a></li>
                <li><a href="../messages/index.html"><span class="material-symbols-rounded">chat_bubble</span>메시지</a></li>
                <li><a href="../search.html"><span class="material-symbols-rounded">search</span>검색</a></li>
                <li><a href="../notifications.html"><span class="material-symbols-rounded">notifications</span>알림</a></li>
                <li><a href="../pam.html"><span class="material-symbols-rounded">groups</span>팸</a></li>
                <li><a href="../write/index.html" class="write-link"><span class="material-symbols-rounded">add_circle</span>게시하기</a></li>
                <li><a href="../settings/index.html"><span class="material-symbols-rounded">settings</span>설정</a></li>
            </ul>
            <div class="nav-footer">
                <button id="logout-btn"><span class="material-symbols-rounded">logout</span>로그아웃</button>
            </div>
        </nav>

        <main class="ug-main-feed">
            <header class="main-header" style="padding: 20px 28px; border-bottom: 1px solid var(--border);">
                <button class="back-btn" onclick="history.back()">
                    <span class="material-symbols-rounded">arrow_back</span>
                </button>
                <h1 id="header-username">프로필</h1>
            </header>

            <div class="profile-scroll-area">
                <!-- 프로필 상단 -->
                <div class="profile-hero">
                    <div class="profile-avatar-wrap">
                        <img id="profile-avatar" src="" alt="avatar" class="profile-avatar">
                        <label id="avatar-upload-label" class="avatar-upload-overlay" style="display:none;">
                            <span class="material-symbols-rounded">photo_camera</span>
                            <input type="file" id="avatar-file-input" accept="image/*" style="display:none;">
                        </label>
                    </div>
                    <div class="profile-info">
                        <div class="profile-name-row">
                            <h2 id="profile-username"></h2>
                            <button id="edit-btn" class="profile-edit-btn" style="display:none;">
                                <span class="material-symbols-rounded">edit</span> 프로필 수정
                            </button>
                            <button id="follow-btn" class="profile-follow-btn" style="display:none;">팔로우</button>
                        </div>
                        <p id="profile-description" class="profile-desc"></p>
                        <div class="profile-stats">
                            <div class="stat-item">
                                <span id="stat-posts" class="stat-num">0</span>
                                <span class="stat-label">게시물</span>
                            </div>
                            <div class="stat-item stat-clickable" id="stat-followers-wrap" title="팔로워 목록">
                                <span id="stat-followers" class="stat-num">0</span>
                                <span class="stat-label">팔로워</span>
                            </div>
                            <div class="stat-item stat-clickable" id="stat-following-wrap" title="팔로잉 목록">
                                <span id="stat-following" class="stat-num">0</span>
                                <span class="stat-label">팔로잉</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 수정 폼 (기본 숨김) -->
                <div id="edit-form" class="profile-edit-form" style="display:none;">
                    <h3>프로필 수정</h3>
                    <div class="edit-field">
                        <label>닉네임</label>
                        <input type="text" id="edit-username" class="edit-input" placeholder="닉네임">
                    </div>
                    <div class="edit-field">
                        <label>소개글</label>
                        <textarea id="edit-description" class="edit-input edit-textarea" placeholder="자신을 소개해보세요..."></textarea>
                    </div>
                    <div class="edit-field">
                        <label>위치</label>
                        <input type="text" id="edit-location" class="edit-input" placeholder="위치">
                    </div>
                    <div class="edit-field">
                        <label>소속</label>
                        <input type="text" id="edit-organization" class="edit-input" placeholder="소속 / 직업">
                    </div>
                    <div class="edit-actions">
                        <button id="save-btn" class="profile-save-btn">저장하기</button>
                        <button id="cancel-btn" class="profile-cancel-btn">취소</button>
                    </div>
                </div>

                <!-- 가입 팸 가로 스크롤 -->
                <div id="profile-pams-section" class="profile-pams-section" style="display:none;">
                    <div class="profile-posts-header">
                        <span class="material-symbols-rounded">groups</span> 참여 중인 팸
                    </div>
                    <div id="profile-pams-list" class="profile-pams-list" style="padding: 0 28px 10px;"></div>
                </div>

                <!-- 게시물 목록 -->
                <div class="profile-posts-header">
                    <span class="material-symbols-rounded">grid_on</span> 게시물
                </div>
                <div id="profile-posts" class="profile-posts-grid-v2" style="padding: 0 28px 32px;">
                    <div class="feed-loader">
                        <span class="material-symbols-rounded animation-spin">sync</span>
                    </div>
                </div>
            </div>
        </main>

        <aside class="ug-right-panel">
            <div id="auth-section" class="auth-status-card">
                <div class="loader-small">연결 중...</div>
            </div>
        </aside>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/common-ui.js"></script>
    <script src="../js/auth-handler.js"></script>
    <script src="./profile-logic.js"></script>
</body>
</html>
