<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnderGarden | 팸 만들기</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/main-style.css">
    <link rel="stylesheet" href="../css/pam-style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="ug-layout">

    <nav class="ug-side-nav">
        <div class="nav-header">
            <a href="../index.html" class="logo">UnderGarden</a>
        </div>
        <ul class="nav-links">
            <li><a href="../index.html"><span class="material-symbols-rounded">home</span>홈</a></li>
            <li>
                <a href="../messages/index.html">
                    <span class="material-symbols-rounded">chat_bubble</span>메시지
                    <div id="nav-msg-badge" class="badge" style="display:none">0</div>
                </a>
            </li>
            <li><a href="../search.html"><span class="material-symbols-rounded">search</span>검색</a></li>
            <li>
                <a href="../notifications.html" class="noti-link">
                    <span class="material-symbols-rounded">notifications</span>알림
                    <div id="nav-noti-badge" class="badge" style="display:none">0</div>
                </a>
            </li>
            <li><a href="../pam.html" class="active"><span class="material-symbols-rounded">groups</span>팸</a></li>
            <li>
                <a href="../write/index.html" class="write-link">
                    <span class="material-symbols-rounded">add_circle</span>게시하기
                </a>
            </li>
        </ul>
        <div class="nav-footer">
            <button id="logout-btn"><span class="material-symbols-rounded">logout</span>로그아웃</button>
        </div>
    </nav>

    <!-- 팸 만들기 메인 -->
    <main class="pam-create-main">
        <header class="pam-create-header">
            <button class="back-btn" onclick="history.back()">
                <span class="material-symbols-rounded">arrow_back</span>
            </button>
            <h1>팸 만들기</h1>
            <div class="token-cost-badge">
                <span class="token-flower">🌸</span>
                <span>100 잎 필요</span>
                <span class="my-token-display">보유: <strong id="header-token">?</strong> 잎</span>
            </div>
        </header>

        <div class="pam-create-body">

            <!-- 왼쪽: 미리보기 카드 -->
            <div class="pam-create-preview">
                <div class="preview-label">미리보기</div>
                <div class="pam-card preview-card" id="preview-card">
                    <div class="pam-card-img-wrap">
                        <img id="preview-img" src="" alt="" style="display:none;">
                        <div class="pam-card-img-placeholder" id="preview-placeholder">
                            <span class="material-symbols-rounded">add_photo_alternate</span>
                            <span>사진을 추가해보세요</span>
                        </div>
                        <div class="pam-card-overlay"></div>
                        <div class="pam-card-badges" id="preview-badges"></div>
                    </div>
                    <div class="pam-card-body">
                        <div class="pam-card-name" id="preview-name">팸 이름</div>
                        <div class="pam-card-desc" id="preview-desc">팸 설명이 여기에 표시됩니다</div>
                        <div class="pam-card-footer">
                            <span class="pam-card-members">
                                <span class="material-symbols-rounded">group</span>1명
                            </span>
                            <span id="preview-lock" style="display:none;" class="pam-card-lock">
                                <span class="material-symbols-rounded">lock</span>
                            </span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 오른쪽: 설정 -->
            <div class="pam-create-form">

                <!-- 제목 -->
                <div class="form-section">
                    <label class="form-label">팸 이름 <span class="required">*</span></label>
                    <input type="text" id="pam-name" class="form-input" placeholder="팸 이름을 입력하세요" maxlength="20">
                    <div class="input-counter"><span id="name-count">0</span>/20</div>
                </div>

                <!-- 사진 + 설정 가로 배치 -->
                <div class="form-row">
                    <!-- 사진 -->
                    <div class="form-section form-img-section">
                        <label class="form-label">대표 사진</label>
                        <label for="pam-img-file" class="img-upload-label" id="img-upload-label">
                            <span class="material-symbols-rounded">add_photo_alternate</span>
                            <span>사진 업로드</span>
                        </label>
                        <input type="file" id="pam-img-file" accept="image/*" style="display:none;">
                    </div>

                    <!-- 지역/나이/성별 -->
                    <div class="form-section form-tags-section">
                        <label class="form-label">대상 설정</label>
                        <div class="tag-selects">
                            <select id="pam-region" class="form-select">
                                <option value="">지역 (상관없음)</option>
                                <option value="서울">서울</option>
                                <option value="경기">경기</option>
                                <option value="인천">인천</option>
                                <option value="부산">부산</option>
                                <option value="대구">대구</option>
                                <option value="광주">광주</option>
                                <option value="대전">대전</option>
                                <option value="울산">울산</option>
                                <option value="강원">강원</option>
                                <option value="충청">충청</option>
                                <option value="전라">전라</option>
                                <option value="경상">경상</option>
                                <option value="제주">제주</option>
                                <option value="온라인">온라인</option>
                            </select>
                            <select id="pam-age" class="form-select">
                                <option value="">나이대 (상관없음)</option>
                                <option value="10대">10대</option>
                                <option value="20대">20대</option>
                                <option value="30대">30대</option>
                                <option value="40대">40대</option>
                            </select>
                            <select id="pam-gender" class="form-select">
                                <option value="">성별 (상관없음)</option>
                                <option value="남성">남성만</option>
                                <option value="여성">여성만</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- 설명 -->
                <div class="form-section">
                    <label class="form-label">팸 설명</label>
                    <textarea id="pam-desc" class="form-textarea" placeholder="팸을 소개해주세요. 어떤 사람들을 찾고 있나요?" maxlength="200" rows="4"></textarea>
                    <div class="input-counter"><span id="desc-count">0</span>/200</div>
                </div>

                <!-- 비밀번호 -->
                <div class="form-section">
                    <label class="form-label pw-label">
                        <label class="toggle-wrap">
                            <input type="checkbox" id="pw-toggle" class="pw-toggle-input">
                            <span class="toggle-slider"></span>
                        </label>
                        비밀번호 설정 (6자리)
                    </label>
                    <div id="pw-input-wrap" style="display:none;">
                        <input type="password" id="pam-pw" class="form-input pw-input" placeholder="숫자 6자리" maxlength="6" pattern="[0-9]*" inputmode="numeric">
                    </div>
                </div>

                <!-- 제출 -->
                <button class="pam-submit-btn" id="pam-submit-btn">
                    <span class="token-flower">🌸</span>
                    100 잎으로 팸 만들기
                </button>
                <p class="submit-notice">팸을 만들면 100 잎이 차감됩니다. 해산 시 환불되지 않습니다.</p>
            </div>
        </div>
    </main>
</div>

<script src="../js/supabase-config.js"></script>
<script src="../js/auth-handler.js"></script>
<script src="../js/pam-create-logic.js"></script>
</body>
</html>
