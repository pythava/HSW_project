<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnderGarden | 검색</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/main-style.css">
    <link rel="stylesheet" href="./css/search-style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="ug-layout">
 
        <nav class="ug-side-nav">
            <div class="nav-header">
                <a href="./index.html" class="logo">UnderGarden</a>
            </div>
            <ul class="nav-links">
                <li><a href="./index.html"><span class="material-symbols-rounded">home</span>홈</a></li>
                <li><a href="./messages/index.html" style="position:relative;"><span class="material-symbols-rounded">chat_bubble</span>메시지<div id="nav-msg-badge" class="badge" style="display:none">0</div></a></li>
                <li><a href="./search.html" class="active"><span class="material-symbols-rounded">search</span>검색</a></li>
                <li>
                    <a href="./notifications.html" class="noti-link">
                        <span class="material-symbols-rounded">notifications</span>알림
                        <div id="nav-noti-badge" class="badge" style="display:none">0</div>
                    </a>
                </li>
                <li><a href="./pam.html"><span class="material-symbols-rounded">groups</span>팸</a></li>
                <li><a href="./shop/index.html"><span class="material-symbols-rounded">storefront</span>상점</a></li>
                <li><a href="./settings/index.html"><span class="material-symbols-rounded">settings</span>설정</a></li>
                <li>
                    <a href="./write/index.html" class="write-link">
                        <span class="material-symbols-rounded">add_circle</span>게시하기
                    </a>
                </li>
            </ul>
            <div class="nav-footer">
                <button id="logout-btn">
                    <span class="material-symbols-rounded">logout</span>로그아웃
                </button>
            </div>
        </nav>
 
        <main class="ug-main-feed search-main">
 
            <div class="search-header">
                <div class="search-bar-wrap">
                    <span class="material-symbols-rounded search-icon">search</span>
                    <input type="text" id="search-input" class="search-input"
                        placeholder="유저, 팸, 게시물 검색..." autocomplete="off">
                    <button id="search-clear" class="search-clear" style="display:none;">
                        <span class="material-symbols-rounded">close</span>
                    </button>
                </div>
            </div>
 
            <!-- 기본 화면 -->
            <div id="search-default" class="search-scroll-area">
                <div class="section-block">
                    <div class="section-title-row">
                        <span class="material-symbols-rounded">local_fire_department</span>
                        <h2>인기 팸</h2>
                    </div>
                    <div id="trending-pams" class="trending-pams-row">
                        <div class="skeleton-pam-card"></div>
                        <div class="skeleton-pam-card"></div>
                        <div class="skeleton-pam-card"></div>
                        <div class="skeleton-pam-card"></div>
                        <div class="skeleton-pam-card"></div>
                    </div>
                </div>
                <div class="section-block">
                    <div class="section-title-row">
                        <span class="material-symbols-rounded">auto_awesome</span>
                        <h2>인기 게시물</h2>
                    </div>
                    <div id="trending-posts" class="posts-grid">
                        <div class="skeleton-post"></div>
                        <div class="skeleton-post"></div>
                        <div class="skeleton-post"></div>
                        <div class="skeleton-post"></div>
                        <div class="skeleton-post"></div>
                        <div class="skeleton-post"></div>
                    </div>
                </div>
            </div>
 
            <!-- 검색 결과 화면 -->
            <div id="search-results" class="search-scroll-area" style="display:none;">
 
                <div class="search-filter-bar">
                    <button class="filter-tab active" data-filter="all">모두</button>
                    <button class="filter-tab" data-filter="pam">팸만</button>
                    <button class="filter-tab" data-filter="user">유저만</button>
                    <button class="filter-tab" data-filter="post">게시물만</button>
                </div>
 
                <div id="result-users-section" class="result-section">
                    <div class="result-section-header">
                        <span>유저</span>
                        <button id="user-more-btn" class="more-link" style="display:none;">
                            더 보기 <span class="material-symbols-rounded">chevron_right</span>
                        </button>
                    </div>
                    <div id="result-users" class="user-list"></div>
                </div>
 
                <div id="result-pams-section" class="result-section">
                    <div class="result-section-header"><span>팸</span></div>
                    <div id="result-pams" class="pams-result-row"></div>
                </div>
 
                <div id="result-posts-section" class="result-section">
                    <div class="result-section-header"><span>게시물</span></div>
                    <div id="result-posts" class="posts-grid"></div>
                </div>
 
                <div id="no-results" class="no-results" style="display:none;">
                    <span class="material-symbols-rounded">search_off</span>
                    <p>검색 결과가 없어요</p>
                    <small>다른 키워드로 검색해보세요</small>
                </div>
            </div>
 
        </main>
 
        <aside class="ug-right-panel">
            <div id="auth-section" class="auth-status-card">
                <div class="loader-small">연결 중...</div>
            </div>
            <div class="right-panel-content">
            </div>
        </aside>
    </div>
 
    <script src="./js/supabase-config.js"></script>
    <script src="./js/common-ui.js"></script>
    <script src="./js/auth-handler.js"></script>
    <script src="./js/badge-logic.js"></script>
<script src="./js/search-logic.js"></script>
</body>
</html>
